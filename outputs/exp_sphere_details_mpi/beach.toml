[sim]
dt = 2e-8
batch_count = 10000
max_step = 10000
tol_rel = 1.0e-8
softening = 1.0e-6
b0 = [0.0, 0.0, 0.0]
use_box = true
box_min = [0.0, 0.0, 0.0]
box_max = [1.0, 1.0, 10.0]
bc_x_low = "periodic"
bc_x_high = "periodic"
bc_y_low = "periodic"
bc_y_high = "periodic"
bc_z_low = "open"
bc_z_high = "open"
rng_seed = 12345

batch_duration_step = 60000

[particles]
[[particles.species]]
source_mode = "reservoir_face"
number_density_cm3 = 5.0
temperature_ev = 10.0
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
target_macro_particles_per_batch = 5000
inject_face = "z_high"
pos_low = [0.0, 0.0, 10.0]
pos_high = [1.0, 1.0, 10.0]
drift_velocity = [0.0, 0.0, -4.0e5]

[[particles.species]]
source_mode = "reservoir_face"
number_density_cm3 = 5.0
temperature_ev = 10.0
q_particle = 1.602176634e-19
m_particle = 1.672482821616e-27
target_macro_particles_per_batch = 2656
inject_face = "z_high"
pos_low = [0.0, 0.0, 10.0]
pos_high = [1.0, 1.0, 10.0]
drift_velocity = [0.0, 0.0, -4.0e5]

[mesh]
mode = "template"
n_templates = 2

# 1) 床（箱の中心に置く。境界 z=0 直上に上げて数値的な不安定/すり抜けを避ける）
[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 1.0
size_y = 1.0
nx = 20
ny = 20
center = [0.50, 0.50, 0.02]

# 4) 球（床に接地：center_z = z_floor + radius）
[[mesh.templates]]
kind = "sphere"
enabled = true
radius = 0.5
center = [0.5, 0.5, 0.52]   # 0.02 + 0.14 = 0.16
n_lon = 14
n_lat = 6

[output]
write_files = true
dir = "./outputs/exp_sphere_details_mpi/outputs/latest"
history_stride = 1
