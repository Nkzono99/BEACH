name = "beach_fortran"
version = "0.1.0"
license = "MIT"
author = "beach contributors"
maintainer = "beach contributors"
copyright = "2026"

[build]
auto-executables = true
auto-tests = false
auto-examples = false

[library]
source-dir = "src"

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

[[executable]]
name = "beach"
source-dir = "app"
main = "main.f90"

[[test]]
name = "test_app_config_parser"
source-dir = "test"
main = "test_app_config_parser.f90"

[[test]]
name = "test_boundary"
source-dir = "test"
main = "test_boundary.f90"

[[test]]
name = "test_restart"
source-dir = "test"
main = "test_restart.f90"

[[test]]
name = "test_reservoir_injection"
source-dir = "test"
main = "test_reservoir_injection.f90"

[[test]]
name = "test_dynamics"
source-dir = "test"
main = "test_dynamics.f90"

[[test]]
name = "test_templates_importers_runtime"
source-dir = "test"
main = "test_templates_importers_runtime.f90"

[[test]]
name = "test_simulator"
source-dir = "test"
main = "test_simulator.f90"

[[test]]
name = "test_injection_sampling"
source-dir = "test"
main = "test_injection_sampling.f90"
