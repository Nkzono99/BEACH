name = "beach_fortran"
version = "1.0.0"
license = "Apache-2.0"
author = "beach contributors"
maintainer = "beach contributors"
copyright = "2026"

[build]
auto-executables = true
auto-tests = false
auto-examples = false

[library]
source-dir = "src"

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

[[executable]]
name = "beach"
source-dir = "app"
main = "main.f90"

