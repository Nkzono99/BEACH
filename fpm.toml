name = "beach_fortran"
version = "0.7.1"
license = "MIT"
author = "beach contributors"
maintainer = "beach contributors"
copyright = "2026"

[build]
auto-executables = true
auto-tests = false
auto-examples = false

[library]
source-dir = "src"

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

[[executable]]
name = "beach"
source-dir = "app"
main = "main.f90"

[[test]]
name = "test_app_config_parser"
source-dir = "tests/fortran"
main = "test_app_config_parser.f90"

