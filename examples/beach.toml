[sim]
# max_step = 500 は固定のまま、通過時間が十分になるよう dt を増やす
dt = 1.4e-8
batch_duration_step = 200.0
batch_count = 5
max_step = 500
tol_rel = 1.0e-8
softening = 1.0e-6
b0 = [0.0, 0.0, 0.0]
use_box = true
box_min = [0.0, 0.0, 0.0]
box_max = [1.0, 1.0, 4.0]
bc_x_low = "periodic"
bc_x_high = "periodic"
bc_y_low = "reflect"
bc_y_high = "reflect"
bc_z_low = "open"
bc_z_high = "open"
rng_seed = 12345
reservoir_potential_model = "infinity_barrier"
phi_infty = 0.0
injection_face_phi_grid_n = 3

[particles]
[[particles.species]]
source_mode = "reservoir_face"
number_density_cm3 = 5.0
temperature_ev = 10.0
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
target_macro_particles_per_batch = 300
# w_particle = 1.0e6  # 直接指定したい場合はこちらを有効化し、target は削除する
inject_face = "z_high"
pos_low = [0.0, 0.0, 4.0]
pos_high = [1.0, 1.0, 4.0]
drift_velocity = [0.0, 0.0, -4.0e5]

# [[particles.species]]
# source_mode = "photo_raycast"
# emit_current_density_a_m2 = 2.0e-4
# rays_per_batch = 500
# deposit_opposite_charge_on_emit = true
# q_particle = -1.602176634e-19
# m_particle = 9.10938356e-31
# temperature_ev = 1.5
# normal_drift_speed = 1.0e5
# inject_face = "z_high"
# pos_low = [0.0, 0.0, 4.0]
# pos_high = [1.0, 1.0, 4.0]
# ray_direction = [0.2, 0.0, -1.0]

[[particles.species]]
source_mode = "reservoir_face"
number_density_cm3 = 5.0
temperature_ev = 10.0
q_particle = 1.602176634e-19
m_particle = 9.10938356e-28
target_macro_particles_per_batch = -1
# w_particle = 1.0e6  # 直接指定したい場合はこちらを有効化し、target は削除する
inject_face = "z_high"
pos_low = [0.0, 0.0, 4.0]
pos_high = [1.0, 1.0, 4.0]
drift_velocity = [0.0, 0.0, -4.0e5]

[mesh]
mode = "template"
n_templates = 4

# 1) 床（箱の中心に置く。境界 z=0 直上に上げて数値的な不安定/すり抜けを避ける）
[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 1.0
size_y = 1.0
nx = 20
ny = 20
center = [0.50, 0.50, 0.02]

# 2) 小平板（局所構造：箱内に余裕を持って配置）
[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 0.35
size_y = 0.22
nx = 6
ny = 4
center = [0.32, 0.30, 0.30]

# 3) 円柱（床に接地：center_z = z_floor + height/2）
[[mesh.templates]]
kind = "cylinder"
enabled = true
radius = 0.14
height = 0.28
center = [0.72, 0.58, 0.16]   # 0.02 + 0.14 = 0.16
cap = true
n_theta = 14
n_z = 4

# 4) 球（床に接地：center_z = z_floor + radius）
[[mesh.templates]]
kind = "sphere"
enabled = true
radius = 0.14
center = [0.34, 0.74, 0.16]   # 0.02 + 0.14 = 0.16
n_lon = 14
n_lat = 6

[output]
write_files = true
dir = "outputs/latest"
history_stride = 1
