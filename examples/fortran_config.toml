[sim]
dt = 1.0e-9
npcls_per_step = 96
max_step = 500
tol_rel = 1.0e-8
softening = 1.0e-6
b0 = [0.0, 0.0, 0.0]
use_box = true
box_min = [-0.8, -0.8, -0.1]
box_max = [0.8, 0.8, 1.0]
bc_x_low = "periodic"
bc_x_high = "periodic"
bc_y_low = "reflect"
bc_y_high = "reflect"
bc_z_low = "open"
bc_z_high = "open"

[particles]
rng_seed = 12345
n_particles = 384  # 旧フォーマット（species未使用時）
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
w_particle = 1.0
pos_low = [-0.4, -0.4, 0.2]
pos_high = [0.4, 0.4, 0.5]
drift_velocity = [0.0, 0.0, -8.0e5]
temperature_k = 2.0e4

[[particles.species]]
# speciesを定義した場合、こちらが優先される
n_particles = 160
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
w_particle = 1.0
pos_low = [-0.42, -0.02, 0.42]
pos_high = [-0.08, 0.26, 0.72]
drift_velocity = [1.0e4, -5.0e3, -7.0e5]
temperature_k = 1.8e4

[[particles.species]]
n_particles = 128
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
w_particle = 1.0
pos_low = [0.05, -0.38, 0.48]
pos_high = [0.38, -0.05, 0.78]
