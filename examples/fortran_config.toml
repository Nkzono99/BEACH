[sim]
dt = 1.0e-9
npcls_per_step = 64
max_step = 400
tol_rel = 1.0e-8
softening = 1.0e-6
b0 = [0.0, 0.0, 0.0]
use_box = true
box_min = [-0.6, -0.6, -0.1]
box_max = [0.6, 0.6, 0.8]
bc_x_low = "periodic"
bc_x_high = "periodic"
bc_y_low = "reflect"
bc_y_high = "reflect"
bc_z_low = "open"
bc_z_high = "open"

[particles]
rng_seed = 12345
n_particles = 256  # 旧フォーマット（species未使用時）
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
w_particle = 1.0
pos_low = [-0.4, -0.4, 0.2]
pos_high = [0.4, 0.4, 0.5]
drift_velocity = [0.0, 0.0, -8.0e5]
temperature_k = 2.0e4

[[particles.species]]
# speciesを定義した場合、こちらが優先される
n_particles = 160
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
w_particle = 1.0
pos_low = [-0.4, -0.4, 0.2]
pos_high = [0.4, 0.4, 0.5]
drift_velocity = [0.0, 0.0, -8.0e5]
temperature_k = 2.0e4

[[particles.species]]
n_particles = 96
q_particle = 1.602176634e-19
m_particle = 1.6726219e-27
w_particle = 1.0
pos_low = [-0.2, -0.2, 0.2]
pos_high = [0.2, 0.2, 0.5]
drift_velocity = [0.0, 0.0, -2.0e5]
temperature_k = 5.0e3

[mesh]
mode = "template"
n_templates = 3

[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 1.0
size_y = 1.0
nx = 2
ny = 2
center = [0.0, 0.0, 0.0]

[[mesh.templates]]
# 同じkindを複数指定可能（2枚目のplane）
kind = "plane"
enabled = true
size_x = 0.6
size_y = 0.6
nx = 1
ny = 1
center = [0.0, 0.0, 0.2]

[[mesh.templates]]
kind = "box"
enabled = true
size = [0.2, 0.2, 0.2]
center = [0.0, 0.0, 0.4]
nx = 1
ny = 1
nz = 1

[output]
write_files = true
dir = "outputs/latest"
