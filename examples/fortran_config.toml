size_y = 1.0
nx = 4
ny = 3
center = [0.0, 0.0, 0.0]

[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 0.35
size_y = 0.22
nx = 2
ny = 1
center = [0.30, 0.26, 0.24]

[[mesh.templates]]
kind = "cylinder"
enabled = true
radius = 0.14
height = 0.28
center = [-0.22, 0.10, 0.18]
cap = true
n_theta = 14
n_z = 1

[[mesh.templates]]
kind = "sphere"
enabled = true
radius = 0.14
center = [0.18, -0.20, 0.34]
