[sim]
dt = 1.0e-9
rng_seed = 12345
batch_count = 5
max_step = 500
tol_rel = 1.0e-8
softening = 1.0e-6
b0 = [0.0, 0.0, 0.0]
use_box = true
box_min = [0.0, 0.0, 0.0]
box_max = [1.0, 1.0, 4.0]
bc_x_low = "periodic"
bc_x_high = "periodic"
bc_y_low = "reflect"
bc_y_high = "reflect"
bc_z_low = "open"
bc_z_high = "open"

[[particles.species]]
# 単一種でも [[particles.species]] を1件以上定義する
npcls_per_step = 400
q_particle = -1.602176634e-19
m_particle = 9.10938356e-31
w_particle = 1.0
pos_low = [0.0, 0.0, 4.0]
pos_high = [1.0, 1.0, 4.0]
drift_velocity = [0.0, 0.0, -7.0e5]
temperature_k = 2.0e4

[[particles.species]]
npcls_per_step = 80
q_particle = 1.602176634e-19
m_particle = 9.10938356e-28
w_particle = 1.0
pos_low = [0.0, 0.0, 4.0]
pos_high = [1.0, 1.0, 4.0]
drift_velocity = [0.0, 0.0, -7.0e5]
temperature_k = 2.0e4

[mesh]
mode = "template"
n_templates = 4

[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 1.2
size_y = 1.0
nx = 20
ny = 20
center = [0.0, 0.0, 0.0]

[[mesh.templates]]
kind = "plane"
enabled = true
size_x = 0.35
size_y = 0.22
nx = 2
ny = 1
center = [0.30, 0.26, 0.24]

[[mesh.templates]]
kind = "cylinder"
enabled = true
radius = 0.14
height = 0.28
center = [-0.22, 0.10, 0.18]
cap = true
n_theta = 14
n_z = 1

[[mesh.templates]]
kind = "sphere"
enabled = true
radius = 0.14
center = [0.18, -0.20, 0.34]
n_lon = 14
n_lat = 6

[output]
write_files = true
dir = "outputs/latest"
history_stride = 1
