name: Fortran Format

on:
  pull_request:
    paths:
      - "src/**/*.f90"
      - "src/**/*.F90"
      - "app/**/*.f90"
      - "app/**/*.F90"
      - "tests/fortran/**/*.f90"
      - "tests/fortran/**/*.F90"
      - ".pre-commit-config.yaml"
      - "Makefile"
      - "AGENTS.md"
      - "README.md"
      - ".github/workflows/fortran-format.yml"
  push:
    branches:
      - main
    paths:
      - "src/**/*.f90"
      - "src/**/*.F90"
      - "app/**/*.f90"
      - "app/**/*.F90"
      - "tests/fortran/**/*.f90"
      - "tests/fortran/**/*.F90"
      - ".pre-commit-config.yaml"
      - "Makefile"
      - "AGENTS.md"
      - "README.md"
      - ".github/workflows/fortran-format.yml"

jobs:
  fprettify:
    name: fprettify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run fprettify hook
        run: pre-commit run fprettify --all-files

      - name: Ensure formatter produced no diff
        run: git diff --exit-code -- src app tests/fortran
